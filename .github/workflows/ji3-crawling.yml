name: ji3-crawling [blog-ji3]

on:
  schedule:
    # KST 08:00 ~ 18:00, 30분 간격 (UTC 기준)
    # KST = UTC + 9h  →  UTC 23:xx ~ 09:xx
    - cron: "0 23 * * *" # KST 08:00, 08:30
    - cron: "0 0 * * *" # KST 09:00, 09:30
    - cron: "0 1 * * *" # KST 10:00, 10:30
    - cron: "0 2 * * *" # KST 11:00, 11:30
    - cron: "0 3 * * *" # KST 12:00, 12:30
    - cron: "0 4 * * *" # KST 13:00, 13:30
    - cron: "0 5 * * *" # KST 14:00, 14:30
    - cron: "0 6 * * *" # KST 15:00, 15:30
    - cron: "0 7 * * *" # KST 16:00, 16:30

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-batch:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers (only if missing)
        run: |
          if [ ! -d ~/.cache/ms-playwright ]; then
            npx playwright install --with-deps
          fi

      - name: Run blog-ji3-crawling.js
        run: node blog-ji3-crawling.js > ji3_crawl_log.txt 2>&1
        env:
          GEMINI_API_KEY_M3: ${{ secrets.GEMINI_API_KEY_M3 }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ji3-crawl-artifacts
          path: |
            ji3_crawl_log.txt
            data/**

      - name: Commit data to repository
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}
          git add -f data/**
          git status
          if ! git diff --cached --quiet; then
            git commit -m "자동 업데이트: ji3 크롤링 데이터"
            git pull --rebase origin main || true
            git push origin HEAD:main
            echo "✅ 커밋 & 푸시 완료"
          else
            echo "No changes to commit"
          fi

  write-blog:
    needs: run-batch
    if: success()
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: main # 크롤링 결과가 커밋된 최신 main을 가져옴

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers (only if missing)
        run: |
          if [ ! -d ~/.cache/ms-playwright ]; then
            npx playwright install --with-deps
          fi

      - name: Run blog-ji3-naver.js (네이버 블로그 자동 포스팅)
        run: node blog-ji3-naver.js > ji3_naver_log.txt 2>&1
        env:
          NAVER_ID_JI3: ${{ secrets.NAVER_ID_JI3 }}
          NAVER_PW_JI3: ${{ secrets.NAVER_PW_JI3 }}
          BLOG_NAME_JI3: ${{ secrets.BLOG_NAME_JI3 }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload naver log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ji3-naver-artifacts
          path: ji3_naver_log.txt
